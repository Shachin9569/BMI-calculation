<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel = "stylesheet" href = "style.css">
</head>
<body>
    <div class="container">
        <h1 style="color: rgb(89, 93, 87);">BMI Calculator</h1>
        <form action="" style="text-align: center;">
            <p>
                Height in cm <input type="text" id="height">
            </p>
                        <p>
                Weight in kg <input type="text" id="weight">
            </p>
            <button style="margin-top: 15px; display: inline-block; border-radius: 5px;">Calculate</button>
            <div class="result"></div>
            <div class="weight-guide" style="margin-top: 10px;">BMI weight guide
                <p>Under weigth = Less than 18.6</p>
                <p>Normal weight = 18.6 and 24.9</p>
                <p>Over weight  = greator than 24.9</p>
            </div> 
            
        </form>
        
    </div>
    <script src="script.js"></script>
    
</body>
</html>
